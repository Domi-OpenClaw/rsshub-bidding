name: Test bjx.com.cn Access

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-bjx:
    runs-on: ubuntu-latest
    steps:
      - name: Check runner IP
        run: |
          echo "Runner IP: $(curl -s https://api.ipify.org)"

      - name: Test bjx.com.cn RSS
        run: |
          echo "=== Testing bjx.com.cn RSS from GitHub Runner ==="
          HTTP_CODE=$(curl -s -o /tmp/bjx.xml -w "%{http_code}" \
            "https://news.bjx.com.cn/rss.php?col=409" --max-time 15 -L)
          echo "HTTP: $HTTP_CODE"
          echo "File size: $(wc -c < /tmp/bjx.xml) bytes"
          echo "Item count: $(grep -c '<item>' /tmp/bjx.xml || echo 0)"
          echo "Has WAF: $(grep -c 'renderData\|aliyun_waf\|Verification' /tmp/bjx.xml || echo 0)"
          echo ""
          echo "=== Content preview ==="
          head -c 400 /tmp/bjx.xml

      - name: Test with Python
        run: |
          python3 -c "
import urllib.request
resp = urllib.request.urlopen('https://news.bjx.com.cn/rss.php?col=409', timeout=15)
content = resp.read().decode('utf-8', errors='ignore')
print(f'Status: {resp.status}')
print(f'Size: {len(content)}')
print(f'Items: {content.count(chr(60)+\"item>\"))}')
print(f'WAF: {chr(34)}aliyun_waf{chr(34)} in content or {chr(34)}renderData{chr(34)} in content')
if content.count('<item>') > 0:
    import re
    titles = re.findall(r'<title><!\[CDATA\[(.*?)\]\]></title>', content)
    print(f'Titles ({len(titles)}):')
    for t in titles[:5]: print(f'  - {t}')
else:
    print(content[:500])
"
