name: Test bjx Runner Access

on:
  workflow_dispatch:

jobs:
  test-bjx:
    runs-on: ubuntu-latest
    steps:
      - name: Check runner IP
        run: |
          echo "Runner IP:"
          curl -s https://api.ipify.org
          echo ""

      - name: Test bjx.com.cn RSS access
        run: |
          echo "=== curl bjx.com.cn RSS ==="
          HTTP_CODE=$(curl -s -o /tmp/bjx_rss.xml -w "%{http_code}" \
            "https://news.bjx.com.cn/rss.php?col=409" --max-time 15 -L)
          echo "HTTP: $HTTP_CODE | Size: $(wc -c < /tmp/bjx_rss.xml) bytes"
          echo "Item count: $(grep -c '<item>' /tmp/bjx_rss.xml || echo 0)"
          echo "Has WAF challenge: $(grep -c 'renderData\|aliyun_waf\|Verification' /tmp/bjx_rss.xml || echo 0)"
          echo ""
          echo "First 500 chars:"
          head -c 500 /tmp/bjx_rss.xml

      - name: Parse RSS with Python
        run: |
          python3 -c "
import urllib.request
try:
    resp = urllib.request.urlopen('https://news.bjx.com.cn/rss.php?col=409', timeout=15)
    content = resp.read().decode('utf-8', errors='ignore')
    items = content.count('<item>')
    has_waf = 'renderData' in content or 'aliyun_waf' in content
    print(f'Status: {resp.status}')
    print(f'Size: {len(content)} bytes')
    print(f'RSS Items: {items}')
    print(f'WAF Challenge: {has_waf}')
    if items > 0:
        # Extract titles
        import re
        titles = re.findall(r'<title><!\[CDATA\[(.*?)\]\]></title>', content)
        print(f'Titles ({len(titles)}):')
        for t in titles[:5]:
            print(f'  - {t}')
    else:
        print('Content preview:')
        print(content[:500])
except Exception as e:
    print(f'Error: {e}')
"

      - name: Upload result as artifact
        if: true
        run: |
          echo "runner_ip=$(curl -s https://api.ipify.org)" >> $GITHUB_ENV
