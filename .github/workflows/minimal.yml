name: Minimal Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-bjx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test bjx.com.cn RSS
        run: |
          HTTP_CODE=$(curl -s -o bjx_result.xml -w "%{http_code}" \
            "https://news.bjx.com.cn/rss.php?col=409" --max-time 15 -L)
          ITEMS=$(grep -c '<item>' bjx_result.xml || echo "0")
          WAF=$(grep -c 'renderData\|aliyun_waf\|Verification' bjx_result.xml || echo "0")
          RUNNER_IP=$(curl -s https://api.ipify.org)
          
          echo "=== GitHub Runner bjx.com.cn Test ===" > bjx_report.txt
          echo "Runner IP: $RUNNER_IP" >> bjx_report.txt
          echo "HTTP Code: $HTTP_CODE" >> bjx_report.txt
          echo "RSS Items: $ITEMS" >> bjx_report.txt
          echo "WAF Challenge: $WAF" >> bjx_report.txt
          echo "" >> bjx_report.txt
          echo "=== XML Preview (first 1000 chars) ===" >> bjx_report.txt
          head -c 1000 bjx_result.xml >> bjx_report.txt
          
          echo "=== Console Output ==="
          echo "Runner IP: $RUNNER_IP"
          echo "HTTP Code: $HTTP_CODE"  
          echo "RSS Items found: $ITEMS"
          echo "WAF Challenge: $WAF"

      - name: Commit result to repo
        run: |
          git config user.name "Domi Bot"
          git config user.email "domi@openclaw.ai"
          git add bjx_report.txt bjx_result.xml 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: bjx runner test result $(date +%Y%m%d%H%M%S)" && \
            git push
