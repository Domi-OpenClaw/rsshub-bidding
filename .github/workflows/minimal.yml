name: Minimal Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-bjx:
    runs-on: ubuntu-latest
    steps:
      - name: Check runner IP
        run: |
          echo "Runner IP: $(curl -s https://api.ipify.org)"

      - name: Test bjx.com.cn RSS
        run: |
          echo "=== GitHub Runner -> bjx.com.cn ==="
          HTTP_CODE=$(curl -s -o /tmp/bjx.xml -w "%{http_code}" \
            "https://news.bjx.com.cn/rss.php?col=409" --max-time 15 -L)
          echo "HTTP_CODE: $HTTP_CODE"
          echo "File_size: $(wc -c < /tmp/bjx.xml) bytes"
          echo "Item_count: $(grep -c '<item>' /tmp/bjx.xml || echo 0)"
          echo "Has_WAF: $(grep -c 'renderData\|aliyun_waf\|Verification' /tmp/bjx.xml || echo 0)"
          echo ""
          head -c 500 /tmp/bjx.xml
